<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: monospace; font-size: 14px; color: #222; max-width: 620px; margin: 0 auto; padding: 16px; }

  .chart { margin-top: 12px; margin-bottom: 20px; }
  .chart img { display: block; max-width: 100%; border-radius: 4px; }

  .section { margin-bottom: 14px; line-height: 1.5; }
  .section-name { font-weight: bold; }

  .stat-weight  { font-family: monospace; background-color: #d4e8ff; color: #1a62b0; padding: 1px 4px; border-radius: 5px; }
  .stat-cals    { font-family: monospace; background-color: #ffd699; color: #bb7000; padding: 1px 4px; border-radius: 5px; }
  .stat-protein { font-family: monospace; background-color: #e8d5ff; color: #6a00b8; padding: 1px 4px; border-radius: 5px; }
  .stat-outlined { border: 1px solid currentColor; }

  .meal-table { border-collapse: collapse; }
  .meal-table td { padding: 1px 4px; vertical-align: middle; }
  .col-heading { font-weight: bold; padding: 8px 0 2px; border-bottom: 1px solid #aaa; }
  .col-skipped { font-style: italic; color: #606060; }
  .col-qty   { text-align: right; white-space: nowrap; font-style: italic; color: #606060; }
  .col-emoji  { padding-right: 5px !important; border-bottom: 1px dashed #aaa; }
  .col-name  { padding-right: 5px !important; border-bottom: 1px dashed #aaa; }
  .col-cals  { text-align: right; white-space: nowrap; }
  .col-prot  { text-align: right; white-space: nowrap; padding-right: 0 !important; }
</style>
</head>
<body>

<!-- <div class="header">
  <strong><?= data.isComplete ? "✅" : "📝" ?> <?= data.longDate ?></strong>
</div> -->

<div class="section">
  <div class="section-name">STATS</div>

  📏 Weight:
  <? if (data.todayWeightKg !== null) { ?>
    <span class="stat-weight stat-outlined"><?= data.todayWeightKg.toLocaleString() ?><?= data.weightUnit ?></span>
    <? if (data.goalWeightKg !== null) { ?>
      <? var diff = Math.round((data.todayWeightKg - data.goalWeightKg) * 10) / 10; ?>
      (<strong><?= (diff > 0 ? '+' : '−') + diff ?><?= data.weightUnit ?></strong> of <strong><?= data.goalWeightKg.toLocaleString() ?><?= data.weightUnit ?></strong> goal)
    <? } ?>
  <? } else { ?>
    <span class="col-skipped">[no data for today]</span>
  <? } ?>
  <br>

  🔥 Calories:
  <? if (data.foodCals !== null && data.budgetCals !== null) { ?>
    <span class="stat-cals stat-outlined"><?= data.foodCals.toLocaleString() ?>&nbsp;cal</span>
    (<strong><?= data.calPct ?>%</strong> of <strong><?= data.budgetCals.toLocaleString() ?>&nbsp;cal</strong> daily budget)
  <? } else { ?>
    <span class="col-skipped">[no data for today]</span>
  <? } ?>
  <br>

  🥩 Protein:
  <? if (data.foodProtein !== null && data.proteinTargetG !== null) { ?>
    <span class="stat-protein stat-outlined"><?= data.foodProtein.toLocaleString() ?>g</span>
    (<strong><?= data.proteinPct ?>%</strong> of <strong><?= data.proteinTargetG.toLocaleString() ?>g</strong> <em>recommended</em> daily intake)
  <? } else { ?>
    <span class="col-skipped">[no data for today]</span>
  <? } ?>
</div>

<div class="chart">
  <img src="<?= data.weightOnlyChartUrl ?>" alt="Weight trend chart" width="560" height="200">
</div>

<div class="chart">
  <img src="<?= data.chartUrl ?>" alt="Weight and calories chart" width="560" height="200">
</div>

<?
function heatBg(val, max, r2, g2, b2) {
  var t = Math.min(Math.max(+val, 0) / max, 1);
  return 'rgb(' + Math.round(255 + (r2-255)*t) + ',' + Math.round(255 + (g2-255)*t) + ',' + Math.round(255 + (b2-255)*t) + ')';
}
?>
<div class="section">
  <table class="meal-table">
  <? data.mealGroups.forEach(function(meal) { ?>
    <tr>
      <td class="col-heading" colspan="3">
        <?= meal.name.toUpperCase() ?>
      </td>
      <td class="col-heading col-cals"><span class="stat-cals stat-outlined" style="background-color:<?!= heatBg(meal.totalCals, data.foodCals, 255, 160, 40) ?>;"><?= meal.totalCals.toLocaleString() ?>&nbsp;cal</span></td>
      <td class="col-heading col-prot"><span class="stat-protein stat-outlined" style="background-color:<?!= heatBg(meal.totalProtein, data.foodProtein, 176, 64, 255) ?>;"><?= Math.round(meal.totalProtein) ?>g</span></td>
    </tr>

    <? meal.items.forEach(function(item) { ?>
    <tr>
      <td class="col-qty"><?= item.qtyStr || '' ?></td>
      <td class="col-emoji"><?= item.emoji ?></td>
      <td class="col-name"><?= item.name ?></td>
      <td class="col-cals"><span class="stat-cals" style="background-color:<?!= heatBg(item.cals, meal.totalCals, 255, 160, 40) ?>;"><?= item.cals ?>&nbsp;cal</span></td>
      <td class="col-prot"><span class="stat-protein" style="background-color:<?!= heatBg(item.protein, meal.totalProtein, 176, 64, 255) ?>;"><?= Math.round(item.protein) ?>g</span></td>
    </tr>
    <? }); ?>

    <tr>
      <? if (meal.items.length === 0) { ?>
      <td colspan="5" class="col-skipped">(Skipped)</td>
      <? } else { ?>
      <td colspan="5"></td>
      <? } ?>
    </tr>
    <tr><td colspan="5">&nbsp;</td></tr>
  <? }); ?>
  </table>
</div>

<div style="margin-top: 28px; font-size: 11px; color: #aaa; text-align: left;">
  <a href="https://github.com/demoive/gas-loseit-export" style="color: #aaa;">
    Open source on Github
  </a>
</div>

</body>
</html>
