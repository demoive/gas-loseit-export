<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 32px; background: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .outer { background: #eaeaef; border-radius: 12px 12px 5px 5px; padding: 15px 20px 20px 20px; box-shadow: 0 0 10px rgb(184, 184, 184); max-width: 620px; margin: 0 auto; }
  .titlebar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 0 4px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .titlebar-label { font-size: 12px; color: #888780; flex: 1; text-align: center; }
  .window { background: #ffffff; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.12); overflow: hidden; }
  .header { padding: 14px 20px; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
  .header-subject { margin: 0 0 2px; font-size: 13px; font-weight: 500; color: #1a1a1a; }
  .header-from { margin: 0; font-size: 12px; color: #888780; }
  .body { padding: 20px; }
  .body img { width: 100%; border-radius: 4px; display: block; }
</style>
</head>
<body>
<div class="outer">
  <div class="titlebar">
    <div class="dot" style="background:#E24B4A;"></div>
    <div class="dot" style="background:#EF9F27;"></div>
    <div class="dot" style="background:#639922;"></div>
    <span class="titlebar-label">Gmail — Inbox</span>
  </div>
  <div class="window">
    <div class="header">
      <p class="header-subject">Lose It! Daily Digest</p>
      <p class="header-from">gmail@chucknorris.com</p>
    </div>
    <div class="body">
      <img src="./preview-daily-digest-screenshot.png" />
    </div>
  </div>
</div>
</body>
</html>
